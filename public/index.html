<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lojiq WMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #07111F;
      --primary: #2F80ED;
      --primary-soft: #66B3FF;
      --text: #DCEBFF;
      --muted: #8FAECC;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(47,128,237,0.18), transparent 30%),
        linear-gradient(180deg, #050D18 0%, var(--bg) 100%);
      text-align: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      padding: 40px 20px;
    }

    .logo {
      width: 420px;
      max-width: 90%;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: 20px;
      letter-spacing: 4px;
      color: var(--muted);
      margin-bottom: 50px;
      font-weight: 600;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .button {
      min-width: 240px;
      padding: 18px 28px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-soft));
      box-shadow: 0 10px 25px rgba(47,128,237,0.25);
      transition: all 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(47,128,237,0.35);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <img src="/images/lojiq-logo.png" alt="Lojiq Logo" class="logo" />

    <!-- Subtitle -->
    <div class="subtitle">WAREHOUSE MANAGEMENT SYSTEM</div>

    <!-- Navigation Buttons -->
    <div class="buttons">
      <a href="/receive.html" class="button">Receive Parcels</a>
      <a href="/inbound.html" class="button">Verify Products</a>
    </div>
  </div>
</body>
</html>
