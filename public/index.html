<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lojiq WMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #07111F;
      --primary: #2F80ED;
      --primary-soft: #66B3FF;
      --text: #DCEBFF;
      --muted: #8FAECC;
      --panel: #0E2238;
      --border: #163252;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(47,128,237,0.18), transparent 30%),
        linear-gradient(180deg, #050D18 0%, var(--bg) 100%);
      text-align: center;
    }

    .container {
      max-width: 1100px;
      width: 100%;
      padding: 20px;
    }

    /* Logo Section */
    .logo {
      width: 560px;        /* Increased from 420px */
      max-width: 95%;
      margin-bottom: 25px;
    }
    
    .subtitle {
      font-size: 26px;     /* Increased from 20px */
      letter-spacing: 6px; /* More elegant spacing */
      color: var(--muted);
      margin-bottom: 60px;
      font-weight: 600;
    }

    /* Grid Cards */
    .grid {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .card {
      width: 260px;
      padding: 30px 20px;
      border-radius: 18px;
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(180deg, rgba(16,41,68,0.95), rgba(14,34,56,0.95));
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
      transition: all 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 35px rgba(47,128,237,0.25);
      border-color: var(--primary);
    }

    .icon {
      font-size: 42px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- Logo -->
    <img src="/images/lojiq-logo.png" alt="Lojiq Logo" class="logo" />

    <!-- Subtitle -->
    <div class="subtitle">WAREHOUSE MANAGEMENT SYSTEM</div>

    <!-- Navigation Cards -->
    <div class="grid">
      
      <!-- Receive Parcels -->
      <a href="/receive.html" class="card">
        <div class="icon">📥</div>
        <div class="card-title">Receive Parcels</div>
        <div class="card-desc">
          Scan incoming packages and register them
        </div>
      </a>

      <!-- Verify Products -->
      <a href="/inbound.html" class="card">
        <div class="icon">📦</div>
        <div class="card-title">Verify Products</div>
        <div class="card-desc">
          Scan and verify items inside parcels
        </div>
      </a>

      <a href="/create-outbound.html" class="card">
        <div class="icon">📤</div>
        <div class="card-title">Create Outbound</div>
        <div class="card-desc">
          Build outbound parcels for selling or forwarding
        </div>
      </a>

      <a href="/pack-ship.html" class="card">
        <div class="icon">🚚</div>
        <div class="card-title">Pack & Ship</div>
        <div class="card-desc">
          Pack ready shipments, scan parcel contents and finish shipping
        </div>
      </a>

    </div>
  </div>
</body>
</html>
