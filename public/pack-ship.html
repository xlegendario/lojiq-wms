<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lojiq WMS - Pack & Ship</title>
  <style>
    :root {
      --bg: #07111F;
      --panel: #0E2238;
      --border: #163252;
      --primary: #2F80ED;
      --primary-soft: #66B3FF;
      --text: #DCEBFF;
      --muted: #8FAECC;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(47,128,237,0.18), transparent 30%),
        linear-gradient(180deg, #050D18 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar {
      position: absolute;
      top: 28px;
      left: 28px;
    }

    .home-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
      color: #DCEBFF;
      background: linear-gradient(135deg, #2F80ED, #66B3FF);
      border: 1px solid rgba(102, 179, 255, 0.35);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 110px 20px 60px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 34px;
    }

    .page-title {
      margin: 0;
      font-size: 56px;
      font-weight: 800;
    }

    .card {
      background: linear-gradient(180deg, rgba(16,41,68,0.95), rgba(14,34,56,0.95));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
      margin-bottom: 24px;
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr auto;
      gap: 16px;
      align-items: end;
    }

    .work-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .field-label {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .input, select {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(7,17,31,0.7);
      color: var(--text);
      padding: 14px;
      font-size: 15px;
      outline: none;
    }

    .button {
      cursor: pointer;
      border-radius: 12px;
      border: none;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--primary-soft));
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .scan-hidden {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .list-box {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(7,17,31,0.35);
      overflow: hidden;
    }

    .list-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(22,50,82,0.85);
      font-size: 14px;
      align-items: center;
    }

    .add-one-btn {
      min-width: 44px;
      padding: 10px 12px;
    }

    .list-row:last-child {
      border-bottom: none;
    }

    .list-row .meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .empty {
      padding: 18px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .tracking-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .tracking-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(7,17,31,0.35);
      overflow: hidden;
    }

    .tracking-head {
      padding: 14px;
      border-bottom: 1px solid rgba(22,50,82,0.85);
      font-weight: 800;
    }

    .tracking-head.active {
      background: rgba(47,128,237,0.14);
    }

    .tracking-items {
      min-height: 76px;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .toast-stack {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      width: min(720px, 100%);
      border-radius: 10px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.28);
      overflow: hidden;
      pointer-events: auto;
      animation: toastIn 0.22s ease-out;
    }

    .toast.success { background: #DDF5E8; border-bottom: 5px solid #16B364; color: #184B32; }
    .toast.error { background: #FDE8E8; border-bottom: 5px solid #F04438; color: #5F2120; }
    .toast.warning { background: #FDF0DD; border-bottom: 5px solid #F59E0B; color: #6B4A14; }

    .toast-inner {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 16px 18px 14px;
    }

    .toast-icon {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      flex: 0 0 34px;
    }

    .toast.success .toast-icon { background: #16B364; }
    .toast.error .toast-icon { background: #F04438; }
    .toast.warning .toast-icon { background: #F59E0B; }

    .toast-title { font-size: 18px; font-weight: 800; }
    .toast-message { font-size: 15px; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 980px) {
      .top-grid,
      .work-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: stretch;
      }

      .actions .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/" class="home-button">Home</a>
  </div>

  <div class="wrap">
    <div class="page-header">
      <h1 class="page-title">Pack & Ship</h1>
    </div>

    <div class="card">
      <h2>Outbound Selection</h2>

      <div class="top-grid">
        <div>
          <div class="field-label">Outbound</div>
          <select id="outboundSelect">
            <option value="" selected disabled>Select Outbound</option>
          </select>
        </div>

        <div>
          <div class="field-label">Shipping Status</div>
          <input id="shippingStatusDisplay" class="input" readonly />
        </div>

        <div>
          <div class="field-label">Current Tracking Number</div>
          <select id="trackingSelect">
            <option value="" selected disabled>Select Tracking Number</option>
          </select>
        </div>

        <div class="button-row">
          <button id="refocusBtn" class="button secondary" type="button">Refocus</button>
        </div>
      </div>

      <div style="margin-top: 16px;">
        <div class="field-label">Shipping Labels</div>
        <div id="shippingLabelsWrap" class="button-row"></div>
      </div>

      <input id="scanInput" class="input scan-hidden" placeholder="Scan GTIN and press Enter" />
    </div>

    <div class="work-grid">
      <div class="card">
        <h2>Items To Pack</h2>
        <div id="unpackedItems" class="list-box">
          <div class="empty">Select an outbound first</div>
        </div>
      </div>

      <div class="card">
        <h2>Items Per Parcel</h2>
        <div id="trackingAssignments" class="tracking-grid">
          <div class="empty">Select an outbound first</div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button id="submitBtn" class="button" type="button">Submit</button>
    </div>
  </div>

  <div id="toastStack" class="toast-stack"></div>

  <script>
    const outboundSelect = document.getElementById("outboundSelect");
    const shippingStatusDisplay = document.getElementById("shippingStatusDisplay");
    const trackingSelect = document.getElementById("trackingSelect");
    const shippingLabelsWrap = document.getElementById("shippingLabelsWrap");
    const unpackedItems = document.getElementById("unpackedItems");
    const trackingAssignments = document.getElementById("trackingAssignments");
    const scanInput = document.getElementById("scanInput");
    const refocusBtn = document.getElementById("refocusBtn");
    const submitBtn = document.getElementById("submitBtn");
    const toastStack = document.getElementById("toastStack");

    let outboundOptions = [];
    let currentOutbound = null;
    let unpacked = [];
    let assignments = {};

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function showToast(message, type = "success", title = "Success") {
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <div class="toast-inner">
          <div class="toast-icon">${type === "success" ? "✓" : type === "warning" ? "!" : "×"}</div>
          <div>
            <div class="toast-title">${escapeHtml(title)}</div>
            <div class="toast-message">${escapeHtml(message)}</div>
          </div>
        </div>
      `;
      toastStack.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }

    function focusScanner() {
      scanInput.focus();
    }

    function getItemGroupKey(item) {
      return [
        item.product_name || "",
        item.sku || "",
        item.size || "",
        item.gtin || ""
      ].join("||");
    }

    function groupItems(items) {
      const grouped = new Map();

      for (const item of items || []) {
        const key = getItemGroupKey(item);

        if (!grouped.has(key)) {
          grouped.set(key, {
            ...item,
            quantity: 0
          });
        }

        grouped.get(key).quantity += 1;
      }

      return Array.from(grouped.values());
    }

    function buildItemsPerParcelText() {
      if (!currentOutbound) return "";

      return currentOutbound.tracking_numbers.map((trackingNumber) => {
        const items = groupItems(assignments[trackingNumber] || []);
        const lines = items.map((item) =>
          `- ${item.quantity}x ${item.product_name} | ${item.sku} | ${item.size} | GTIN: ${item.gtin || "—"}`
        );

        return [
          `Tracking Number: ${trackingNumber}`,
          ...(lines.length ? lines : ["- No items"])
        ].join("\n");
      }).join("\n\n");
    }

    function renderUnpacked() {
      if (!currentOutbound) {
        unpackedItems.innerHTML = `<div class="empty">Select an outbound first</div>`;
        return;
      }

      if (!unpacked.length) {
        unpackedItems.innerHTML = `<div class="empty">All items packed</div>`;
        return;
      }

      const groupedItems = groupItems(unpacked);

      unpackedItems.innerHTML = groupedItems.map((item) => `
        <div class="list-row">
          <div>
            <div>${escapeHtml(item.product_name || "Unnamed product")}</div>
            <div class="meta">${escapeHtml(item.sku)} / ${escapeHtml(item.size)} / ${escapeHtml(item.gtin || "—")}</div>
          </div>
          <div>${item.quantity}x</div>
          <div>
            <button
              class="button secondary add-one-btn"
              type="button"
              data-add-one-key="${escapeHtml(getItemGroupKey(item))}"
            >
              +
            </button>
          </div>
        </div>
      `).join("");
    }

    function renderAssignments() {
      if (!currentOutbound) {
        trackingAssignments.innerHTML = `<div class="empty">Select an outbound first</div>`;
        return;
      }

      trackingAssignments.innerHTML = currentOutbound.tracking_numbers.map((trackingNumber) => {
        const items = assignments[trackingNumber] || [];
        const groupedItems = groupItems(items);
        const active = trackingSelect.value === trackingNumber;

        return `
          <div class="tracking-card">
            <div class="tracking-head ${active ? "active" : ""}">${escapeHtml(trackingNumber)}</div>
            <div class="tracking-items">
              ${groupedItems.length ? groupedItems.map((item) => `
                <div class="list-row">
                  <div>
                    <div>${escapeHtml(item.product_name || "Unnamed product")}</div>
                    <div class="meta">${escapeHtml(item.sku)} / ${escapeHtml(item.size)} / ${escapeHtml(item.gtin || "—")}</div>
                  </div>
                  <div>${item.quantity}x</div>
                </div>
              `).join("") : `<div class="empty">No items in this parcel yet</div>`}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderShippingLabels() {
      if (!currentOutbound || !currentOutbound.shipping_labels.length) {
        shippingLabelsWrap.innerHTML = `<span class="empty" style="padding:0;">No shipping labels attached</span>`;
        return;
      }

      shippingLabelsWrap.innerHTML = currentOutbound.shipping_labels.map((file, index) => `
        <a class="button secondary" href="${escapeHtml(file.url)}" target="_blank" rel="noopener noreferrer">
          Download Label ${index + 1}
        </a>
      `).join("");
    }

    function renderTrackingOptions() {
      trackingSelect.innerHTML = `<option value="" selected disabled>Select Tracking Number</option>`;

      if (!currentOutbound) return;

      currentOutbound.tracking_numbers.forEach((trackingNumber, index) => {
        const option = document.createElement("option");
        option.value = trackingNumber;
        option.textContent = trackingNumber;
        trackingSelect.appendChild(option);

        if (index === 0) {
          trackingSelect.value = trackingNumber;
        }
      });
    }

    function syncSinglePackageUI() {
      const isSinglePackage = currentOutbound?.source_table === "unfulfilled_orders_log";
      trackingSelect.disabled = !!isSinglePackage;
    }    

    async function loadOutboundOptions() {
      const response = await fetch("/api/pack-ship-outbounds");
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Failed to load outbounds");
      }

      outboundOptions = Array.isArray(data.outbounds) ? data.outbounds : [];

      outboundSelect.innerHTML = `<option value="" selected disabled>Select Outbound</option>`;

      outboundOptions.forEach((option) => {
        const el = document.createElement("option");
        el.value = option.id;
        el.textContent = option.label;
        el.dataset.sourceTable = option.source_table;
        outboundSelect.appendChild(el);
      });
    }

    async function loadOutboundDetails(outboundId) {
      const selectedOption = outboundSelect.options[outboundSelect.selectedIndex];
      const sourceTable = selectedOption?.dataset?.sourceTable || "";

      const response = await fetch(
        `/api/pack-ship-outbound/${encodeURIComponent(outboundId)}?source_table=${encodeURIComponent(sourceTable)}`
      );
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Failed to load outbound details");
      }

      currentOutbound = data.outbound;
      unpacked = Array.isArray(currentOutbound.items) ? [...currentOutbound.items] : [];
      assignments = {};

      currentOutbound.tracking_numbers.forEach((trackingNumber) => {
        assignments[trackingNumber] = [];
      });

      shippingStatusDisplay.value = currentOutbound.shipping_status || "";
      renderTrackingOptions();
      syncSinglePackageUI();
      renderShippingLabels();
      renderUnpacked();
      renderAssignments();
      focusScanner();
    }

    function handleScan(gtin) {
      if (!currentOutbound) {
        showToast("Select an outbound first.", "warning", "Warning");
        return;
      }

      const trackingNumber = trackingSelect.value;

      if (!trackingNumber) {
        showToast("Select a tracking number first.", "warning", "Warning");
        return;
      }

      const cleanGtin = gtin.trim();
      if (!cleanGtin) return;

      const itemIndex = unpacked.findIndex((item) => item.gtin === cleanGtin);
      if (itemIndex === -1) {
        showToast("This item is not available to pack or is already packed.", "warning", "Warning");
        return;
      }

      const [item] = unpacked.splice(itemIndex, 1);
      assignments[trackingNumber].push(item);

      renderUnpacked();
      renderAssignments();
      showToast(`Packed ${item.product_name || item.gtin} into ${trackingNumber}.`, "success", "Success");
    }

    function addOneItemToCurrentParcelByKey(itemGroupKey) {
      if (!currentOutbound) {
        showToast("Select an outbound first.", "warning", "Warning");
        return;
      }
    
      const trackingNumber = trackingSelect.value;
    
      if (!trackingNumber) {
        showToast("Select a tracking number first.", "warning", "Warning");
        return;
      }
    
      const itemIndex = unpacked.findIndex((item) => getItemGroupKey(item) === itemGroupKey);
    
      if (itemIndex === -1) {
        showToast("This item is not available to pack or is already packed.", "warning", "Warning");
        return;
      }
    
      const [item] = unpacked.splice(itemIndex, 1);
      assignments[trackingNumber].push(item);
    
      renderUnpacked();
      renderAssignments();
      showToast(`Packed ${item.product_name || item.gtin} into ${trackingNumber}.`, "success", "Success");
    }

    async function submitPackedOutbound() {
      if (!currentOutbound) {
        showToast("Select an outbound first.", "warning", "Warning");
        return;
      }

      if (unpacked.length) {
        showToast("All items must be packed before submitting.", "warning", "Warning");
        return;
      }

      const itemsPerParcel = buildItemsPerParcelText();

      const packedInventoryUnitIds = Object.values(assignments)
        .flat()
        .map((item) => item.id)
        .filter(Boolean);

      const response = await fetch("/api/submit-pack-ship", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          outbound_id: currentOutbound.id,
          source_table: currentOutbound.source_table,
          items_per_parcel: itemsPerParcel,
          packed_inventory_unit_ids: packedInventoryUnitIds
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Failed to submit pack & ship");
      }

      showToast("Outbound marked as shipped.", "success", "Success");
      currentOutbound = null;
      unpacked = [];
      assignments = {};
      shippingStatusDisplay.value = "";
      trackingSelect.disabled = false;
      trackingSelect.innerHTML = `<option value="" selected disabled>Select Tracking Number</option>`;
      shippingLabelsWrap.innerHTML = "";
      renderUnpacked();
      renderAssignments();
      await loadOutboundOptions();
      outboundSelect.value = "";
    }

    outboundSelect.addEventListener("change", async () => {
      try {
        await loadOutboundDetails(outboundSelect.value);
      } catch (error) {
        showToast(error.message, "error", "Error");
      }
    });

    trackingSelect.addEventListener("change", () => {
      renderAssignments();
      focusScanner();
    });

    unpackedItems.addEventListener("click", (event) => {
      const button = event.target.closest("[data-add-one-key]");
      if (!button) return;
    
      addOneItemToCurrentParcelByKey(button.dataset.addOneKey);
      focusScanner();
    });

    refocusBtn.addEventListener("click", () => {
      focusScanner();
      showToast("Scanner refocused.", "success", "Success");
    });

    scanInput.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      handleScan(scanInput.value);
      scanInput.value = "";
    });

    submitBtn.addEventListener("click", async () => {
      try {
        await submitPackedOutbound();
      } catch (error) {
        showToast(error.message, "error", "Error");
      }
    });

    document.addEventListener("click", (event) => {
      const target = event.target;

      const clickedInsideEditableField =
        target === outboundSelect ||
        target === trackingSelect ||
        target === scanInput ||
        target.closest?.(".button") ||
        target.closest?.(".toast") ||
        target.closest?.(".home-button") ||
        target.closest?.("select");

      if (!clickedInsideEditableField && currentOutbound) {
        focusScanner();
      }
    });

    loadOutboundOptions().catch((error) => {
      showToast(error.message, "error", "Error");
    });
  </script>
</body>
</html>
