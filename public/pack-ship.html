<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lojiq WMS - Pack & Ship</title>
  <style>
    :root {
      --bg: #07111F;
      --panel: #0E2238;
      --border: #163252;
      --primary: #2F80ED;
      --primary-soft: #66B3FF;
      --text: #DCEBFF;
      --muted: #8FAECC;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(47,128,237,0.18), transparent 30%),
        linear-gradient(180deg, #050D18 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar {
      position: absolute;
      top: 28px;
      left: 28px;
    }

    .home-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
      color: #DCEBFF;
      background: linear-gradient(135deg, #2F80ED, #66B3FF);
      border: 1px solid rgba(102, 179, 255, 0.35);
    }

    .wrap {
      max-width: 1350px;
      margin: 0 auto;
      padding: 110px 20px 60px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 34px;
    }

    .page-title {
      margin: 0;
      font-size: 56px;
      font-weight: 800;
    }

    .stack {
      display: grid;
      gap: 24px;
    }

    .shipment-card,
    .parcel-card {
      background: linear-gradient(180deg, rgba(16,41,68,0.95), rgba(14,34,56,0.95));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }

    .shipment-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      margin-bottom: 18px;
    }

    .shipment-title {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .shipment-meta {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .button {
      cursor: pointer;
      border-radius: 12px;
      border: none;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--primary-soft));
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .parcel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    .field-label {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(7,17,31,0.7);
      color: var(--text);
      padding: 14px;
      font-size: 15px;
      outline: none;
    }

    .parcel-items {
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(7,17,31,0.35);
      overflow: hidden;
    }

    .parcel-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(22,50,82,0.85);
      font-size: 14px;
    }

    .parcel-item:last-child {
      border-bottom: none;
    }

    .empty {
      padding: 18px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .shipment-summary {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(7,17,31,0.35);
      white-space: pre-wrap;
      font-size: 14px;
      color: var(--text);
    }

    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .hidden-scan {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .toast-stack {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      width: min(720px, 100%);
      border-radius: 10px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.28);
      overflow: hidden;
      pointer-events: auto;
      animation: toastIn 0.22s ease-out;
    }

    .toast.success { background: #DDF5E8; border-bottom: 5px solid #16B364; color: #184B32; }
    .toast.error { background: #FDE8E8; border-bottom: 5px solid #F04438; color: #5F2120; }
    .toast.warning { background: #FDF0DD; border-bottom: 5px solid #F59E0B; color: #6B4A14; }

    .toast-inner {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 16px 18px 14px;
    }

    .toast-icon {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      flex: 0 0 34px;
    }

    .toast.success .toast-icon { background: #16B364; }
    .toast.error .toast-icon { background: #F04438; }
    .toast.warning .toast-icon { background: #F59E0B; }

    .toast-title { font-size: 18px; font-weight: 800; }
    .toast-message { font-size: 15px; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/" class="home-button">Home</a>
  </div>

  <div class="wrap">
    <div class="page-header">
      <h1 class="page-title">Pack & Ship</h1>
    </div>

    <div id="shipmentsContainer" class="stack"></div>
  </div>

  <div id="toastStack" class="toast-stack"></div>

  <script>
    const shipmentsContainer = document.getElementById("shipmentsContainer");
    const toastStack = document.getElementById("toastStack");

    let shipments = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function showToast(message, type = "success", title = "Success") {
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <div class="toast-inner">
          <div class="toast-icon">${type === "success" ? "✓" : type === "warning" ? "!" : "×"}</div>
          <div>
            <div class="toast-title">${escapeHtml(title)}</div>
            <div class="toast-message">${escapeHtml(message)}</div>
          </div>
        </div>
      `;
      toastStack.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }

    function buildItemsPerParcelText(shipment) {
      return shipment.parcels.map((parcel) => {
        const lines = parcel.scannedItems.map((item) =>
          `- ${item.productName} | ${item.sku} | ${item.size} | GTIN: ${item.gtin}`
        );

        return [
          `Tracking Number: ${parcel.trackingNumber}`,
          ...lines
        ].join("\n");
      }).join("\n\n");
    }

    function renderShipments() {
      if (!shipments.length) {
        shipmentsContainer.innerHTML = `
          <div class="shipment-card">
            <h2 class="shipment-title">No Ready To Ship outbounds</h2>
          </div>
        `;
        return;
      }

      shipmentsContainer.innerHTML = shipments.map((shipment, shipmentIndex) => `
        <div class="shipment-card">
          <div class="shipment-header">
            <div>
              <h2 class="shipment-title">Outbound ${shipment.recordId}</h2>
              <div class="shipment-meta">
                <div>Tracking numbers: ${shipment.parcels.length}</div>
                <div>Expected items: ${shipment.remainingItems.length}</div>
              </div>
            </div>

            <div class="button-row">
              ${shipment.shippingLabels.map((file) => `
                <a class="button secondary" href="${escapeHtml(file.url)}" target="_blank" rel="noopener noreferrer">
                  Download Label
                </a>
              `).join("")}
            </div>
          </div>

          <div class="parcel-grid">
            ${shipment.parcels.map((parcel, parcelIndex) => `
              <div class="parcel-card">
                <div class="field-label">Tracking Number</div>
                <div class="input">${escapeHtml(parcel.trackingNumber)}</div>

                <div style="margin-top: 14px;">
                  <div class="field-label">Scan Product GTIN</div>
                  <input
                    class="input"
                    data-scan-shipment-index="${shipmentIndex}"
                    data-scan-parcel-index="${parcelIndex}"
                    placeholder="Scan GTIN and press Enter"
                  />
                </div>

                <div class="parcel-items">
                  ${parcel.scannedItems.length ? parcel.scannedItems.map((item) => `
                    <div class="parcel-item">
                      <div>${escapeHtml(item.productName)}<br><span style="color: var(--muted);">${escapeHtml(item.sku)} / ${escapeHtml(item.size)} / ${escapeHtml(item.gtin)}</span></div>
                      <div>1x</div>
                    </div>
                  `).join("") : `<div class="empty">No items scanned for this parcel yet</div>`}
                </div>
              </div>
            `).join("")}
          </div>

          <div class="shipment-summary">${escapeHtml(buildItemsPerParcelText(shipment) || "No items assigned yet")}</div>

          <div class="actions">
            <button class="button" type="button" data-submit-shipment-index="${shipmentIndex}">Submit</button>
          </div>
        </div>
      `).join("");
    }

    async function loadShipments() {
      const response = await fetch("/api/pack-ship-ready");
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Failed to load shipments");
      }

      shipments = (data.shipments || []).map((shipment) => ({
        ...shipment,
        remainingItems: Array.isArray(shipment.items) ? [...shipment.items] : [],
        parcels: (shipment.parcels || []).map((parcel) => ({
          ...parcel,
          scannedItems: []
        }))
      }));

      renderShipments();
    }

    async function handleParcelScan(shipmentIndex, parcelIndex, gtin) {
      const cleanGtin = gtin.trim();
      if (!cleanGtin) return;

      const shipment = shipments[shipmentIndex];
      const parcel = shipment?.parcels?.[parcelIndex];
      if (!shipment || !parcel) return;

      const itemIndex = shipment.remainingItems.findIndex((item) => item.gtin === cleanGtin);
      if (itemIndex === -1) {
        showToast("Scanned GTIN is not part of this outbound or already fully assigned.", "warning", "Warning");
        renderShipments();
        return;
      }

      const [item] = shipment.remainingItems.splice(itemIndex, 1);
      parcel.scannedItems.push(item);

      renderShipments();
      showToast(`Added ${item.productName} to ${parcel.trackingNumber}.`, "success", "Success");
    }

    async function submitShipment(shipmentIndex) {
      const shipment = shipments[shipmentIndex];
      if (!shipment) return;

      if (shipment.remainingItems.length) {
        showToast("All outbound items must be assigned to a parcel before submitting.", "warning", "Warning");
        return;
      }

      const itemsPerParcel = buildItemsPerParcelText(shipment);

      const response = await fetch("/api/submit-pack-ship", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          outbound_id: shipment.recordId,
          items_per_parcel: itemsPerParcel
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Failed to submit pack & ship");
      }

      showToast("Shipment marked as shipped.", "success", "Success");
      shipments.splice(shipmentIndex, 1);
      renderShipments();
    }

    shipmentsContainer.addEventListener("keydown", async (event) => {
      const input = event.target;
      if (!(input instanceof HTMLInputElement)) return;
      if (event.key !== "Enter") return;
      if (!input.dataset.scanShipmentIndex) return;

      event.preventDefault();

      try {
        await handleParcelScan(
          Number(input.dataset.scanShipmentIndex),
          Number(input.dataset.scanParcelIndex),
          input.value
        );
        input.value = "";
      } catch (error) {
        showToast(error.message, "error", "Error");
      }
    });

    shipmentsContainer.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-submit-shipment-index]");
      if (!button) return;

      try {
        await submitShipment(Number(button.dataset.submitShipmentIndex));
      } catch (error) {
        showToast(error.message, "error", "Error");
      }
    });

    loadShipments().catch((error) => {
      showToast(error.message, "error", "Error");
    });
  </script>
</body>
</html>
