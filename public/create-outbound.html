<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lojiq WMS - Create Outbound</title>
  <style>
    :root {
      --bg: #07111F;
      --panel: #0E2238;
      --border: #163252;
      --primary: #2F80ED;
      --primary-soft: #66B3FF;
      --text: #DCEBFF;
      --muted: #8FAECC;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(47,128,237,0.18), transparent 30%),
        linear-gradient(180deg, #050D18 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar {
      position: absolute;
      top: 28px;
      left: 28px;
    }

    .home-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
      color: #DCEBFF;
      background: linear-gradient(135deg, #2F80ED, #66B3FF);
      border: 1px solid rgba(102, 179, 255, 0.35);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 110px 20px 60px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 34px;
    }

    .page-title {
      margin: 0;
      font-size: 56px;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: linear-gradient(180deg, rgba(16,41,68,0.95), rgba(14,34,56,0.95));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .input, select, .table input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(7,17,31,0.7);
      color: var(--text);
      padding: 14px;
      font-size: 15px;
      outline: none;
    }

    .button {
      cursor: pointer;
      border-radius: 12px;
      border: none;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--primary-soft));
      color: white;
    }

    .button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .summary-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .field-label {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(7,17,31,0.35);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(22,50,82,0.85);
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      color: var(--muted);
      font-weight: 700;
      background: rgba(7,17,31,0.5);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .manual-block {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      border: 1px dashed rgba(102,179,255,0.35);
      background: rgba(47,128,237,0.06);
    }

    .manual-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr auto;
      gap: 10px;
      align-items: end;
    }

    .buyer-details,
    .buyer-form {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(7,17,31,0.35);
    }

    .buyer-details {
      display: none;
    }

    .buyer-details.visible,
    .buyer-form.visible {
      display: block;
    }

    .buyer-detail-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px;
      padding: 4px 0;
      font-size: 14px;
    }

    .buyer-detail-label {
      color: var(--muted);
      font-weight: 700;
    }

    .buyer-form {
      display: none;
    }

    .buyer-form-grid {
      display: grid;
      gap: 12px;
    }

    .summary-bottom {
      margin-top: 16px;
    }
    
    .summary-stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(7,17,31,0.35);
    }
    
    .summary-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    
    .summary-line-label {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
    }
    
    .summary-line-value {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }
    
    .summary-line-input {
      width: 140px;
      min-width: 140px;
      max-width: 140px;
      margin-left: auto;
      text-align: right;
      flex: 0 0 140px;
    }
    
    .result-line {
      padding-top: 10px;
      border-top: 1px solid rgba(22,50,82,0.85);
    }
    
    .result-positive {
      color: #16B364;
    }
    
    .result-negative {
      color: #F04438;
    }

    .scan-hidden {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .delete-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(240, 68, 56, 0.35);
      background: rgba(240, 68, 56, 0.10);
      color: #ff9b95;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s ease;
    }

    .delete-btn:hover {
      background: rgba(240, 68, 56, 0.18);
      border-color: rgba(240, 68, 56, 0.6);
      transform: translateY(-1px);
    }

    .delete-icon {
      width: 18px;
      height: 18px;
      display: block;
    }
    /* Remove number input spinners (Chrome, Edge, Safari, Opera) */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    
    /* Remove number input spinners (Firefox) */
    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .toast-stack {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      width: min(720px, 100%);
      border-radius: 10px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.28);
      overflow: hidden;
      pointer-events: auto;
      animation: toastIn 0.22s ease-out;
    }

    .toast.success { background: #DDF5E8; border-bottom: 5px solid #16B364; color: #184B32; }
    .toast.error { background: #FDE8E8; border-bottom: 5px solid #F04438; color: #5F2120; }
    .toast.warning { background: #FDF0DD; border-bottom: 5px solid #F59E0B; color: #6B4A14; }

    .toast-inner {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 16px 18px 14px;
    }

    .toast-icon {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      flex: 0 0 34px;
    }

    .toast.success .toast-icon { background: #16B364; }
    .toast.error .toast-icon { background: #F04438; }
    .toast.warning .toast-icon { background: #F59E0B; }

    .toast-title { font-size: 18px; font-weight: 800; }
    .toast-message { font-size: 15px; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mode-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .mode-button {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/" class="home-button">Home</a>
  </div>

  <div class="wrap">
    <div class="page-header">
      <h1 class="page-title">Create Outbound</h1>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Outbound Setup</h2>

        <div class="mode-row">
          <button id="sellingBtn" class="button mode-button">Selling</button>
          <button id="forwardingBtn" class="button secondary mode-button">Forwarding</button>
        </div>

        <div class="stack">
          <div id="sellerSelectWrap" style="display:none;">
            <div class="field-label">Seller</div>
            <select id="sellerSelect">
              <option value="" selected disabled>Select Seller</option>
            </select>
          </div>

          <div>
            <div class="field-label">Buyer</div>
            <select id="buyerSelect">
              <option value="" selected disabled>Select Buyer</option>
              <option value="unknown">Unknown</option>
            </select>
          </div>

          <div id="buyerDetails" class="buyer-details"></div>

          <div class="button-row">
            <button id="addBuyerBtn" class="button secondary">+ Add New Buyer</button>
          </div>

          <div id="buyerForm" class="buyer-form">
            <div class="field-label">New Buyer</div>
            <div class="buyer-form-grid">
              <input id="buyerFullNameInput" class="input" placeholder="Full Name *" />
              <input id="buyerCompanyNameInput" class="input" placeholder="Company Name" />
              <input id="buyerVatIdInput" class="input" placeholder="VAT ID" />
              <input id="buyerEmailInput" class="input" placeholder="Email *" />
              <input id="buyerAddressInput" class="input" placeholder="Address *" />
              <input id="buyerAddressLine2Input" class="input" placeholder="Address Line 2" />
              <input id="buyerZipcodeInput" class="input" placeholder="Zipcode *" />
              <input id="buyerCityInput" class="input" placeholder="City *" />
              <select id="buyerCountryInput">
                <option value="" selected disabled>Select Country</option>
              </select>
              <button id="saveBuyerBtn" class="button" type="button">Save Buyer</button>
            </div>
          </div>

          <input id="scanInput" class="input scan-hidden" placeholder="Scan GTIN and press Enter" />
        </div>

        <div class="manual-block">
          <div class="field-label">Manual Add</div>
          <div class="manual-grid">
            <div>
              <div class="field-label">SKU</div>
              <input id="manualSkuInput" class="input" />
            </div>
            <div>
              <div class="field-label">Size</div>
              <input id="manualSizeInput" class="input" />
            </div>
            <div>
              <button id="manualSearchBtn" class="button">+ Add</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Summary</h2>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Product GTIN</th>
                <th>Product Name</th>
                <th>SKU</th>
                <th>Size</th>
                <th>Available</th>
                <th>Quantity</th>
                <th id="unitPriceHeader">Unit Price</th>
                <th id="totalPriceHeader">Total Price</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="itemsTableBody">
              <tr>
                <td colspan="8" class="empty">No products added yet</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="summary-bottom">
          <div class="summary-stack">
            <div class="summary-line">
              <span class="summary-line-label">Items Total:</span>
              <span id="itemsTotalValue" class="summary-line-value">€0.00</span>
            </div>
        
            <div class="summary-line">
              <span class="summary-line-label">Shipping Labels:</span>
              <input id="shippingLabelsInput" class="input summary-line-input" type="number" min="0" step="1" />
            </div>
        
            <div class="summary-line">
              <span class="summary-line-label">Shipping Costs:</span>
              <input id="shippingCostsInput" class="input summary-line-input" type="number" min="0" step="1" />
            </div>
        
            <div class="summary-line" id="totalSellingPriceRow">
              <span class="summary-line-label" id="totalSellingPriceLabel">Total Selling Price:</span>
              <input id="totalSellingPriceInput" class="input summary-line-input" type="number" min="0" step="0.01" />
            </div>
        
            <div class="summary-line result-line" id="resultRow">
              <span class="summary-line-label" id="resultLabel">Result:</span>
              <span id="resultValue" class="summary-line-value">€0.00</span>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="refocusBtn" class="button secondary" type="button">Refocus</button>
          <button id="submitBtn" class="button">Submit</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toastStack" class="toast-stack"></div>

  <script>
    const sellerSelectWrap = document.getElementById("sellerSelectWrap");
    const sellerSelect = document.getElementById("sellerSelect");
    const buyerSelect = document.getElementById("buyerSelect");
    const addBuyerBtn = document.getElementById("addBuyerBtn");
    const buyerDetails = document.getElementById("buyerDetails");
    const buyerForm = document.getElementById("buyerForm");
    const saveBuyerBtn = document.getElementById("saveBuyerBtn");
    const refocusBtn = document.getElementById("refocusBtn");
    const buyerFullNameInput = document.getElementById("buyerFullNameInput");
    const buyerCompanyNameInput = document.getElementById("buyerCompanyNameInput");
    const buyerVatIdInput = document.getElementById("buyerVatIdInput");
    const buyerEmailInput = document.getElementById("buyerEmailInput");
    const buyerAddressInput = document.getElementById("buyerAddressInput");
    const buyerAddressLine2Input = document.getElementById("buyerAddressLine2Input");
    const buyerZipcodeInput = document.getElementById("buyerZipcodeInput");
    const buyerCityInput = document.getElementById("buyerCityInput");
    const buyerCountryInput = document.getElementById("buyerCountryInput");
    const scanInput = document.getElementById("scanInput");
    const manualSkuInput = document.getElementById("manualSkuInput");
    const manualSizeInput = document.getElementById("manualSizeInput");
    const manualSearchBtn = document.getElementById("manualSearchBtn");
    const itemsTableBody = document.getElementById("itemsTableBody");
    const submitBtn = document.getElementById("submitBtn");
    const sellingBtn = document.getElementById("sellingBtn");
    const forwardingBtn = document.getElementById("forwardingBtn");
    const shippingLabelsInput = document.getElementById("shippingLabelsInput");
    const totalSellingPriceInput = document.getElementById("totalSellingPriceInput");
    const shippingCostsInput = document.getElementById("shippingCostsInput");
    const itemsTotalValue = document.getElementById("itemsTotalValue");
    const resultValue = document.getElementById("resultValue");
    const totalSellingPriceRow = document.getElementById("totalSellingPriceRow");
    const totalSellingPriceLabel = document.getElementById("totalSellingPriceLabel");
    const resultRow = document.getElementById("resultRow");
    const resultLabel = document.getElementById("resultLabel");
    const unitPriceHeader = document.getElementById("unitPriceHeader");
    const totalPriceHeader = document.getElementById("totalPriceHeader");
    const toastStack = document.getElementById("toastStack");

    let outboundMode = "Selling";
    let items = [];
    let buyers = [];
    let forwardingSellers = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showToast(message, type = "success", title = "") {
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;

      const resolvedTitle = title || (type === "success" ? "Success" : type === "warning" ? "Warning" : "Error");
      const icon = type === "success" ? "✓" : type === "warning" ? "!" : "✕";

      toast.innerHTML = `
        <div class="toast-inner">
          <div class="toast-icon">${icon}</div>
          <div>
            <div class="toast-title">${resolvedTitle}</div>
            <div class="toast-message">${escapeHtml(message)}</div>
          </div>
        </div>
      `;

      toastStack.appendChild(toast);
      setTimeout(() => toast.remove(), 5000);
    }

    async function loadBuyers() {
      const response = await fetch("/api/outbound-buyers");
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Failed to load buyers");
      }

      buyers = Array.isArray(data.options) ? data.options : [];

      buyerSelect.innerHTML = `
        <option value="" selected disabled>Select Buyer</option>
        <option value="unknown">Unknown</option>
      `;

      for (const option of buyers) {
        const el = document.createElement("option");
        el.value = option.id;
        el.textContent = option.label;
        buyerSelect.appendChild(el);
      }
    }
    
    async function loadForwardingSellers() {
      const response = await fetch("/api/outbound-forwarding-sellers");
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Failed to load sellers");
      }

      forwardingSellers = Array.isArray(data.options) ? data.options : [];

      sellerSelect.innerHTML = `<option value="" selected disabled>Select Seller</option>`;

      for (const option of forwardingSellers) {
        const el = document.createElement("option");
        el.value = option.id;
        el.textContent = option.label;
        sellerSelect.appendChild(el);
      }
    }
    
    async function loadBuyerCountryOptions() {
      const response = await fetch("/api/outbound-buyer-country-options");
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Failed to load country options");
      }

      buyerCountryInput.innerHTML = `<option value="" selected disabled>Select Country</option>`;

      for (const option of data.options || []) {
        const el = document.createElement("option");
        el.value = option;
        el.textContent = option;
        buyerCountryInput.appendChild(el);
      }
    }

    function renderBuyerDetails() {
      const selectedId = buyerSelect.value;

      if (!selectedId || selectedId === "unknown") {
        buyerDetails.className = "buyer-details";
        buyerDetails.innerHTML = "";
        return;
      }

      const selectedBuyer = buyers.find((buyer) => buyer.id === selectedId);
      if (!selectedBuyer) {
        buyerDetails.className = "buyer-details";
        buyerDetails.innerHTML = "";
        return;
      }

      const details = selectedBuyer.details || {};
      const addressParts = [details.address, details.address_line_2].filter(Boolean);

      const rows = [
        ["Full Name", details.full_name],
        ["Company Name", details.company_name],
        ["VAT ID", details.vat_id],
        ["Email", details.email],
        ["Address", addressParts.join(", ")],
        ["Zipcode", details.zipcode],
        ["City", details.city],
        ["Country", details.country]
      ].filter(([, value]) => value);

      buyerDetails.innerHTML = rows.map(([label, value]) => `
        <div class="buyer-detail-row">
          <div class="buyer-detail-label">${escapeHtml(label)}</div>
          <div>${escapeHtml(value)}</div>
        </div>
      `).join("");

      buyerDetails.className = "buyer-details visible";
    }

    function clearBuyerForm() {
      buyerFullNameInput.value = "";
      buyerCompanyNameInput.value = "";
      buyerVatIdInput.value = "";
      buyerEmailInput.value = "";
      buyerAddressInput.value = "";
      buyerAddressLine2Input.value = "";
      buyerZipcodeInput.value = "";
      buyerCityInput.value = "";
      buyerCountryInput.value = "";
    }

    function toggleBuyerForm(forceVisible) {
      const shouldShow = typeof forceVisible === "boolean"
        ? forceVisible
        : !buyerForm.classList.contains("visible");

      buyerForm.className = shouldShow ? "buyer-form visible" : "buyer-form";
      addBuyerBtn.textContent = shouldShow ? "Cancel New Buyer" : "+ Add New Buyer";

      if (!shouldShow) {
        clearBuyerForm();
      }
    }

    function getItemsTotal() {
      return items.reduce((sum, item) => sum + (item.unitPrice * item.quantity), 0);
    }
    
    function syncModeUI() {
      if (outboundMode === "Selling") {
        sellingBtn.className = "button mode-button";
        forwardingBtn.className = "button secondary mode-button";
        sellerSelectWrap.style.display = "none";
        totalSellingPriceLabel.textContent = "Total Selling Price:";
        resultLabel.textContent = "Result:";
        unitPriceHeader.textContent = "Unit Price";
        totalPriceHeader.textContent = "Total Price";
        totalSellingPriceRow.style.display = "";
        resultRow.style.display = "";
      } else {
        sellingBtn.className = "button secondary mode-button";
        forwardingBtn.className = "button mode-button";
        sellerSelectWrap.style.display = "";
        totalSellingPriceLabel.textContent = "Forwarding Total:";
        resultLabel.textContent = "Total:";
        unitPriceHeader.textContent = "Unit Fee";
        totalPriceHeader.textContent = "Total Fee";
        totalSellingPriceRow.style.display = "none";
        resultRow.style.display = "";
      }
    }

    function renderSummaryTotals() {
      const itemsTotal = getItemsTotal();
      const shippingCosts = Number(shippingCostsInput.value) || 0;
      const totalSellingPrice = Number(totalSellingPriceInput.value) || 0;
    
      itemsTotalValue.textContent = `€${itemsTotal.toFixed(2)}`;
    
      if (outboundMode === "Selling") {
        const result = totalSellingPrice - itemsTotal - shippingCosts;

        if (result > 0) {
          resultValue.textContent = `+€${result.toFixed(2)}`;
          resultValue.className = "summary-line-value result-positive";
        } else if (result < 0) {
          resultValue.textContent = `-€${Math.abs(result).toFixed(2)}`;
          resultValue.className = "summary-line-value result-negative";
        } else {
          resultValue.textContent = `€0.00`;
          resultValue.className = "summary-line-value";
        }
      } else {
        const total = itemsTotal + shippingCosts;
        resultValue.textContent = `€${total.toFixed(2)}`;
        resultValue.className = "summary-line-value";
      }
    }

    function renderTable() {
      if (!items.length) {
        itemsTableBody.innerHTML = `<tr><td colspan="9" class="empty">No products added yet</td></tr>`;
        renderSummaryTotals();
        return;
      }

      itemsTableBody.innerHTML = items.map((item, index) => `
        <tr>
          <td>${escapeHtml(item.gtin)}</td>
          <td>${escapeHtml(item.productName)}</td>
          <td>${escapeHtml(item.sku)}</td>
          <td>${escapeHtml(item.size)}</td>
          <td>${item.availableQuantity}</td>
          <td>
            <input
              class="input"
              type="number"
              min="1"
              max="${item.availableQuantity}"
              value="${item.quantity}"
              data-index="${index}"
              data-field="quantity"
            />
          </td>
          <td>${item.unitPrice.toFixed(2)}</td>
          <td>${(item.unitPrice * item.quantity).toFixed(2)}</td>
          <td>
            <button class="delete-btn" type="button" data-delete-index="${index}" aria-label="Delete row">
              <svg class="delete-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
                <path d="M4 7H20" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M9 7V5.8C9 5.35817 9.35817 5 9.8 5H14.2C14.6418 5 15 5.35817 15 5.8V7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M18 7L17.2 18.2C17.1418 19.0146 16.4639 19.645 15.6472 19.645H8.35284C7.53607 19.645 6.85824 19.0146 6.80004 18.2L6 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M10 11V16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M14 11V16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </button>
          </td>
        </tr>
      `).join("");

      renderSummaryTotals();
    }

    function addOrIncrementItem(data) {
      const existing = items.find((item) => item.gtin === data.gtin);

      if (existing) {
        if (existing.quantity >= existing.availableQuantity) {
          showToast("You cannot add more than available stock for this product.", "warning", "Warning");
          return;
        }

        existing.quantity += 1;
        renderTable();
        return;
      }

      items.push({
        gtin: data.gtin,
        productName: data.product_name,
        sku: data.sku,
        size: data.size,
        availableQuantity: data.available_quantity,
        quantity: 1,
        unitPrice: Number(data.unit_price) || 0,
        inventoryUnitIds: Array.isArray(data.inventory_unit_ids) ? data.inventory_unit_ids : [],
        sellerIds: Array.isArray(data.seller_ids) ? data.seller_ids : []
      });

      renderTable();
    }

    async function lookupByGTIN(gtin) {
      if (outboundMode === "Forwarding" && !sellerSelect.value) {
        showToast("Please select a Seller first.", "warning", "Warning");
        return;
      }

      const response = await fetch("/api/outbound-lookup-gtin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          gtin,
          mode: outboundMode,
          seller_id: sellerSelect.value
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Lookup failed");
      }

      if (!data.found) {
        if (data.reason === "unknown_gtin") {
          showToast("Product GTIN unknown in Inventory.", "warning", "Warning");
        } else if (data.reason === "no_available_items") {
          showToast(
            outboundMode === "Forwarding"
              ? "There are no Ready to Forward items for this product from the selected seller."
              : "There are no available items from this product.",
            "warning",
            "Warning"
          );
        }
        return;
      }

      addOrIncrementItem(data);
      showToast(`Added ${data.product_name}.`, "success", "Success");
    }

    async function searchBySkuSize() {
      const sku = manualSkuInput.value.trim();
      const size = manualSizeInput.value.trim();
    
      if (!sku || !size) {
        showToast("Please fill SKU and Size first.", "warning", "Warning");
        return;
      }

      if (outboundMode === "Forwarding" && !sellerSelect.value) {
        showToast("Please select a Seller first.", "warning", "Warning");
        return;
      }
    
      const response = await fetch("/api/outbound-search-sku-size", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          sku,
          size,
          mode: outboundMode,
          seller_id: sellerSelect.value
        })
      });
    
      const data = await response.json();
    
      if (!response.ok) {
        throw new Error(data.details || data.error || "Search failed");
      }
    
      if (!data.found) {
        showToast(
          outboundMode === "Forwarding"
            ? "No Ready to Forward products found for this SKU and Size from the selected seller."
            : "No available products found for this SKU and Size.",
          "warning",
          "Warning"
        );
        return;
      }
    
      addOrIncrementItem(data);
      showToast(`Added ${data.product_name}.`, "success", "Success");
    
      manualSkuInput.value = "";
      manualSizeInput.value = "";
      manualSkuInput.focus();
    }

    async function addBuyer() {
      const payload = {
        full_name: buyerFullNameInput.value.trim(),
        company_name: buyerCompanyNameInput.value.trim(),
        vat_id: buyerVatIdInput.value.trim(),
        email: buyerEmailInput.value.trim(),
        address: buyerAddressInput.value.trim(),
        address_line_2: buyerAddressLine2Input.value.trim(),
        zipcode: buyerZipcodeInput.value.trim(),
        city: buyerCityInput.value.trim(),
        country: buyerCountryInput.value.trim()
      };

      const response = await fetch("/api/outbound-buyers", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Failed to create buyer");
      }

      buyers.push(data.option);

      const el = document.createElement("option");
      el.value = data.option.id;
      el.textContent = data.option.label;
      buyerSelect.appendChild(el);

      buyerSelect.value = data.option.id;
      renderBuyerDetails();
      toggleBuyerForm(false);
      showToast(`Buyer ${data.option.label} created.`, "success", "Success");
    }

    function resetPage() {
      items = [];
      outboundMode = "Selling";
      scanInput.value = "";
      manualSkuInput.value = "";
      manualSizeInput.value = "";
      shippingLabelsInput.value = "";
      totalSellingPriceInput.value = "";
      shippingCostsInput.value = "";
      sellerSelect.value = "";
      buyerSelect.value = "";
      buyerDetails.className = "buyer-details";
      buyerDetails.innerHTML = "";
      toggleBuyerForm(false);
      syncModeUI();
      renderTable();
      scanInput.focus();
    }

    sellingBtn.addEventListener("click", () => {
      outboundMode = "Selling";
      sellerSelect.value = "";
      items = [];
      syncModeUI();
      renderTable();
      renderSummaryTotals();
    });

    forwardingBtn.addEventListener("click", () => {
      outboundMode = "Forwarding";
      sellerSelect.value = "";
      items = [];
      syncModeUI();
      renderTable();
      renderSummaryTotals();
    });

    addBuyerBtn.addEventListener("click", () => {
      toggleBuyerForm();
    });

    saveBuyerBtn.addEventListener("click", async () => {
      try {
        await addBuyer();
      } catch (error) {
        showToast(error.message, "error", "Error");
      }
    });

    refocusBtn.addEventListener("click", () => {
      scanInput.focus();
    });

    buyerSelect.addEventListener("change", () => {
      renderBuyerDetails();
      scanInput.focus();
    });

    sellerSelect.addEventListener("change", () => {
      items = [];
      renderTable();
      scanInput.focus();
    });

    scanInput.addEventListener("keydown", async (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();

      const value = scanInput.value.trim();
      scanInput.value = "";

      if (!value) return;

      try {
        await lookupByGTIN(value);
      } catch (error) {
        showToast(error.message, "error", "Error");
      }
    });

    manualSearchBtn.addEventListener("click", async () => {
      try {
        await searchBySkuSize();
      } catch (error) {
        showToast(error.message, "error", "Error");
      }
    });

    itemsTableBody.addEventListener("click", (event) => {
      const button = event.target.closest("[data-delete-index]");
      if (!button) return;

      const index = Number(button.dataset.deleteIndex);
      if (!Number.isInteger(index) || !items[index]) return;

      const removed = items[index];
      items.splice(index, 1);
      renderTable();
      showToast(`Removed ${removed.productName}.`, "success", "Success");
      scanInput.focus();
    });

    shippingLabelsInput.addEventListener("input", renderSummaryTotals);
    shippingCostsInput.addEventListener("input", renderSummaryTotals);
    totalSellingPriceInput.addEventListener("input", renderSummaryTotals);

    submitBtn.addEventListener("click", async () => {
      if (outboundMode === "Forwarding" && !sellerSelect.value) {
        showToast("Please select a Seller first.", "warning", "Warning");
        return;
      }

      if (!items.length) {
        showToast("Please add at least one product.", "warning", "Warning");
        return;
      }

      const shippingLabelsValue = Number(shippingLabelsInput.value);

      if (shippingLabelsInput.value === "" || Number.isNaN(shippingLabelsValue) || shippingLabelsValue < 0) {
        showToast("Please fill Shipping Labels Needed.", "warning", "Warning");
        return;
      }

      if (shippingCostsInput.value === "") {
        showToast("Please fill Shipping Costs.", "warning", "Warning");
        return;
      }

      if (outboundMode === "Selling") {
        if (!buyerSelect.value) {
          showToast("Please select a Buyer before submitting.", "warning", "Warning");
          return;
        }

        if (!totalSellingPriceInput.value) {
          showToast("Please fill Total Selling Price.", "warning", "Warning");
          return;
        }
      }

      if (outboundMode === "Forwarding" && shippingLabelsValue > 0 && !buyerSelect.value) {
        showToast("Please select a Buyer when labels are needed.", "warning", "Warning");
        return;
      }

      try {
        const response = await fetch("/api/submit-outbound", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            mode: outboundMode,
            buyer_id: buyerSelect.value,
            seller_id: sellerSelect.value,
            total_selling_price: Number(totalSellingPriceInput.value) || 0,
            shipping_costs: Number(shippingCostsInput.value) || 0,
            shipping_labels: shippingLabelsValue,
            items: items.map((item) => ({
              quantity: item.quantity,
              inventory_unit_ids: item.inventoryUnitIds,
              seller_ids: item.sellerIds,
              unit_forwarding_fee: item.unitPrice
            }))
          })
        });
        
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.details || data.error || "Failed to submit outbound");
        }

        showToast(
          outboundMode === "Selling"
            ? "Outbound created successfully."
            : "Forwarding outbound created successfully.",
          "success",
          "Success"
        );
        resetPage();
      } catch (error) {
        showToast(error.message, "error", "Error");
      }
    });
    syncModeUI();
    renderTable();

    Promise.all([loadBuyers(), loadBuyerCountryOptions(), loadForwardingSellers()])
      .then(() => {
        renderBuyerDetails();
        scanInput.focus();
      })
      .catch((error) => {
        showToast(error.message, "error", "Error");
      });
  </script>
</body>
</html>
