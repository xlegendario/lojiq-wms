<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lojiq WMS - Inbound</title>
  <style>
    :root {
      --bg: #07111F;
      --panel: #0E2238;
      --panel-2: #102944;
      --border: #163252;
      --primary: #2F80ED;
      --primary-soft: #66B3FF;
      --text: #DCEBFF;
      --muted: #8FAECC;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(47,128,237,0.18), transparent 30%),
        linear-gradient(180deg, #050D18 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar {
      position: absolute;
      top: 28px;
      left: 28px;
      z-index: 1000;
    }

    .home-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.3px;
      color: #DCEBFF;
      background: linear-gradient(135deg, #2F80ED, #66B3FF);
      border: 1px solid rgba(102, 179, 255, 0.35);
      box-shadow: 0 10px 24px rgba(47, 128, 237, 0.25);
      transition: all 0.2s ease;
    }

    .home-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(47, 128, 237, 0.35);
    }

    .home-button:active {
      transform: translateY(0);
      box-shadow: 0 6px 16px rgba(47, 128, 237, 0.2);
    }

    .home-icon {
      width: 22px;
      height: 22px;
      flex: 0 0 22px;
    }

    .summary-meta-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .summary-meta-group {
      flex: 1;
    }
    
    .summary-type-label {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }
    
    .summary-type-select {
      width: 100%;
    }

    .wrap {
      max-width: 1150px;
      margin: 0 auto;
      padding: 110px 20px 60px;
    }
    
    .page-header {
      text-align: center;
      margin-bottom: 34px;
    }
    
    .page-title {
      margin: 0;
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: linear-gradient(180deg, rgba(16,41,68,0.95), rgba(14,34,56,0.95));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .input,
    .table input,
    select.input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(7,17,31,0.7);
      color: var(--text);
      padding: 14px 14px;
      font-size: 15px;
      outline: none;
    }

    .input:focus,
    .table input:focus,
    select.input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(47,128,237,0.15);
    }

    .button {
      width: 100%;
      cursor: pointer;
      border-radius: 12px;
      border: none;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--primary-soft));
      color: white;
      transition: 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(47,128,237,0.25);
    }

    .button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      margin-top: 10px;
    }

    .status-box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: rgba(7,17,31,0.55);
      border: 1px solid var(--border);
    }

    .status-item {
      margin-bottom: 16px;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .status-label {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .status-value {
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      word-break: break-word;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(7,17,31,0.35);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
    }

    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(22,50,82,0.85);
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      color: var(--muted);
      font-weight: 700;
      background: rgba(7,17,31,0.5);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .qty {
      font-weight: 700;
      color: var(--primary-soft);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .actions .button {
      width: auto;
      min-width: 170px;
    }

    .hidden-scan {
      position: absolute;
      left: -9999px;
      opacity: 0;
      pointer-events: none;
    }

    .delete-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(240, 68, 56, 0.35);
      background: rgba(240, 68, 56, 0.10);
      color: #ff9b95;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s ease;
    }

    .delete-btn:hover {
      background: rgba(240, 68, 56, 0.18);
      border-color: rgba(240, 68, 56, 0.6);
      transform: translateY(-1px);
    }

    .delete-icon {
      width: 18px;
      height: 18px;
      display: block;
    }

    .toast-stack {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      pointer-events: none;
      z-index: 9999;
    }

    .toast {
      width: min(720px, 100%);
      border-radius: 10px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.28);
      overflow: hidden;
      pointer-events: auto;
      animation: toastIn 0.22s ease-out;
    }

    .toast.success {
      background: #DDF5E8;
      border-bottom: 5px solid #16B364;
      color: #184B32;
    }

    .toast.error {
      background: #FDE8E8;
      border-bottom: 5px solid #F04438;
      color: #5F2120;
    }

    .toast.warning {
      background: #FDF0DD;
      border-bottom: 5px solid #F59E0B;
      color: #6B4A14;
    }

    .toast-inner {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 16px 18px 14px;
    }

    .toast-icon {
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
    }

    .toast.success .toast-icon {
      background: #16B364;
      color: white;
    }

    .toast.error .toast-icon {
      background: #F04438;
      color: white;
    }

    .toast.warning .toast-icon {
      background: #F59E0B;
      color: white;
    }

    .toast-text {
      flex: 1;
      text-align: left;
      min-width: 0;
    }

    .toast-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 2px;
    }

    .toast-message {
      font-size: 15px;
      line-height: 1.35;
      word-break: break-word;
    }

    .toast-close {
      flex: 0 0 auto;
      border: none;
      background: transparent;
      color: inherit;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      opacity: 0.75;
      padding: 4px 8px;
    }

    .toast-close:hover {
      opacity: 1;
    }

    .toast.removing {
      animation: toastOut 0.18s ease-in forwards;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(10px);
      }
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }

      .actions .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/" class="home-button">
      <svg class="home-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
        <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Home
    </a>
  </div>

  <div class="wrap">
    <div class="page-header">
      <h1 class="page-title">Verify Products</h1>
    </div>

    <div class="grid">
      <div class="card">
        <h2>VERIFY PARCEL</h2>

        <input
          id="trackingInput"
          class="input"
          type="text"
          placeholder="Scan parcel tracking number"
          autocomplete="off"
        />
        
        <button class="button secondary" id="resetBtn">Reset</button>

        <div class="status-box">
          <div class="status-item">
            <div class="status-label">Status:</div>
            <div class="status-value" id="statusText">Waiting for tracking scan</div>
          </div>

          <div class="status-item">
            <div class="status-label">Tracking:</div>
            <div class="status-value" id="trackingDisplay">—</div>
          </div>

          <div class="status-item">
            <div class="status-label">Unique GTIN's:</div>
            <div class="status-value" id="uniqueCount">0</div>
          </div>

          <div class="status-item">
            <div class="status-label">Total Items:</div>
            <div class="status-value" id="totalCount">0</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>SUMMARY</h2>

        <div class="summary-meta-row">
          <div class="summary-meta-group">
            <div class="summary-type-label">Type</div>
            <select id="typeSelect" class="input summary-type-select" required>
              <option value="" selected disabled>Select Type</option>
              <option value="Unknown">Unknown</option>
              <option value="Consignment">Consignment</option>
              <option value="Forwarding">Forwarding</option>
              <option value="Regular">Regular</option>
            </select>
          </div>
        
          <div class="summary-meta-group">
            <div class="summary-type-label">Client</div>
            <select id="partySelect" class="input summary-type-select" required>
              <option value="" selected disabled>Select Client</option>
              <option value="unknown">Unknown</option>
            </select>
          </div>
        </div>

        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Product GTIN</th>
                <th>SKU</th>
                <th>Size</th>
                <th>Quantity</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="itemsTableBody">
              <tr>
                <td colspan="5" class="empty">No items scanned yet</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="actions">
          <button class="button secondary" id="focusScannerBtn">Refocus</button>
          <button class="button" id="submitBtn">Submit</button>
        </div>
      </div>
    </div>
  </div>

  <input
    id="scanInput"
    class="hidden-scan"
    type="text"
    autocomplete="off"
    autocapitalize="off"
    spellcheck="false"
  />

  <div id="toastStack" class="toast-stack"></div>

  <script>
    const trackingInput = document.getElementById("trackingInput");
    const typeSelect = document.getElementById("typeSelect");
    const partySelect = document.getElementById("partySelect");
    const resetBtn = document.getElementById("resetBtn");
    const submitBtn = document.getElementById("submitBtn");
    const focusScannerBtn = document.getElementById("focusScannerBtn");
    const scanInput = document.getElementById("scanInput");

    const statusText = document.getElementById("statusText");
    const trackingDisplay = document.getElementById("trackingDisplay");
    const uniqueCount = document.getElementById("uniqueCount");
    const totalCount = document.getElementById("totalCount");
    const itemsTableBody = document.getElementById("itemsTableBody");
    const toastStack = document.getElementById("toastStack");

    let parcelStarted = false;
    let trackingNumber = "";
    let parcelType = "";
    let selectedPartyId = "";
    let selectedPartySource = "";
    let items = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showToast(message, type = "success", title = "") {
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;

      let defaultTitle = "Error";
      if (type === "success") defaultTitle = "Success";
      if (type === "warning") defaultTitle = "Warning";

      const resolvedTitle = title || defaultTitle;

      let icon = "✕";
      if (type === "success") icon = "✓";
      if (type === "warning") icon = "!";

      toast.innerHTML = `
        <div class="toast-inner">
          <div class="toast-icon">${icon}</div>
          <div class="toast-text">
            <div class="toast-title">${resolvedTitle}</div>
            <div class="toast-message">${escapeHtml(message)}</div>
          </div>
          <button class="toast-close" type="button" aria-label="Close">✕</button>
        </div>
      `;

      const closeBtn = toast.querySelector(".toast-close");

      function removeToast() {
        if (toast.classList.contains("removing")) return;
        toast.classList.add("removing");
        setTimeout(() => {
          toast.remove();
        }, 180);
      }

      closeBtn.addEventListener("click", removeToast);
      toastStack.appendChild(toast);
      setTimeout(removeToast, 5000);
    }

    function focusScanner() {
      scanInput.focus();
    }

    function updateStatusPanel() {
      statusText.textContent = parcelStarted
        ? "Parcel active — ready to scan item barcodes"
        : "Waiting for tracking scan";
    
      trackingDisplay.textContent = trackingNumber || "—";
      uniqueCount.textContent = items.length;
      totalCount.textContent = items.reduce((sum, item) => sum + item.quantity, 0);
    }

    function renderTable() {
      if (items.length === 0) {
        itemsTableBody.innerHTML = `
          <tr>
            <td colspan="5" class="empty">No items scanned yet</td>
          </tr>
        `;
        updateStatusPanel();
        return;
      }

      itemsTableBody.innerHTML = items.map((item, index) => `
        <tr>
          <td>${escapeHtml(item.gtin)}</td>
          <td>
            <input
              value="${escapeHtml(item.sku)}"
              placeholder="Enter SKU"
              data-index="${index}"
              data-field="sku"
            />
          </td>
          <td>
            <input
              value="${escapeHtml(item.size)}"
              placeholder="Enter size"
              data-index="${index}"
              data-field="size"
            />
          </td>
          <td class="qty">${item.quantity}</td>
          <td>
            <button class="delete-btn" type="button" data-delete-index="${index}" aria-label="Delete row">
              <svg class="delete-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
                <path d="M4 7H20" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M9 7V5.8C9 5.35817 9.35817 5 9.8 5H14.2C14.6418 5 15 5.35817 15 5.8V7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M18 7L17.2 18.2C17.1418 19.0146 16.4639 19.645 15.6472 19.645H8.35284C7.53607 19.645 6.85824 19.0146 6.80004 18.2L6 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M10 11V16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M14 11V16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </button>
          </td>
        </tr>
      `).join("");

      updateStatusPanel();
    }

    async function lookupProduct(gtin) {
      const response = await fetch("/api/lookup-product", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ gtin })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Lookup failed");
      }

      return data;
    }

    async function handleScannedBarcode(gtin) {
      const cleanCode = gtin.trim();
      if (!cleanCode) return;

      const existingItem = items.find(
        (item) => item.gtin === cleanCode
      );

      if (existingItem) {
        existingItem.quantity += 1;
        renderTable();
        showToast(`Scanned again: ${cleanCode}. Quantity updated.`, "success", "Success");
        focusScanner();
        return;
      }

      const newItem = {
        gtin: cleanCode,
        sku: "",
        size: "",
        quantity: 1
      };

      items.push(newItem);
      renderTable();

      try {
        const lookup = await lookupProduct(cleanCode);

        if (lookup.found) {
          newItem.sku = lookup.sku || "";
          newItem.size = lookup.size || "";
          renderTable();
          showToast(`GTIN ${cleanCode} matched successfully.`, "success", "Success");
        } else {
          showToast(
            `GTIN ${cleanCode} was not found. Please fill SKU and Size manually.`,
            "warning",
            "Warning"
          );
        }
      } catch (error) {
        showToast(`Lookup error: ${error.message}`, "error", "Error");
      }

      focusScanner();
    }

    async function loadInboundParties() {
      try {
        const response = await fetch("/api/inbound-parties");
        const data = await response.json();
    
        if (!response.ok) {
          throw new Error(data.details || data.error || "Failed to load parties");
        }
    
        partySelect.innerHTML = `
          <option value="" selected disabled>Select Client</option>
          <option value="unknown">Unknown</option>
        `;
    
        for (const option of data.options) {
          const el = document.createElement("option");
          el.value = `${option.source}:${option.id}`;
          el.textContent = option.label;
          partySelect.appendChild(el);
        }
      } catch (error) {
        showToast(`Failed to load clients: ${error.message}`, "error", "Error");
      }
    }

    function startParcelFromTracking() {
      const value = trackingInput.value.trim();
    
      if (!value) {
        return;
      }
    
      // Remove unwanted prefixes such as "Tracking"
      const cleanedValue = value.replace(/^tracking/i, "").trim();
    
      trackingNumber = cleanedValue;
      parcelStarted = true;
    
      // Clear the input to provide visual feedback
      trackingInput.value = "";
    
      updateStatusPanel();
      focusScanner();
    
      showToast(`Parcel ${trackingNumber} ready for verification.`, "success", "Success");
    }

    function resetParcel() {
      parcelStarted = false;
      trackingNumber = "";
      parcelType = "";
      selectedPartyId = "";
      selectedPartySource = "";
      items = [];
      trackingInput.value = "";
      typeSelect.value = "";
      partySelect.value = "";
      scanInput.value = "";
      renderTable();
      trackingInput.focus();
    }

    async function submitParcel() {
      if (!parcelStarted) {
        showToast("Scan a parcel tracking number first.", "warning", "Warning");
        return;
      }

      if (!trackingNumber) {
        showToast("Missing tracking number.", "error", "Error");
        return;
      }

      if (!items.length) {
        showToast("No items scanned.", "warning", "Warning");
        return;
      }
      
      for (const item of items) {
        if (!item.gtin.trim()) {
          showToast("One item is missing Product GTIN.", "error", "Error");
          return;
        }
      }
      
      const selectedType = typeSelect.value;
      const selectedPartyValue = partySelect.value;
      
      if (!selectedType && !selectedPartyValue) {
        showToast("Please fill Type and Client before submitting.", "warning", "Warning");
        return;
      }
      
      if (!selectedType) {
        showToast("Please fill Type before submitting.", "warning", "Warning");
        typeSelect.focus();
        return;
      }
      
      if (!selectedPartyValue) {
        showToast("Please fill Client before submitting.", "warning", "Warning");
        partySelect.focus();
        return;
      }
      
      parcelType = selectedType;
      
      if (selectedPartyValue === "unknown") {
        selectedPartyId = "";
        selectedPartySource = "";
      } else {
        const [source, id] = selectedPartyValue.split(":");
        selectedPartySource = source || "";
        selectedPartyId = id || "";
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      try {
        const response = await fetch("/api/submit-inbound", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            tracking_number: trackingNumber,
            type: parcelType,
            party_id: selectedPartyId,
            party_source: selectedPartySource,
            items
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.details || data.error || "Submit failed");
        }

        showToast(
          `Parcel submitted successfully. ${data.updated_count} updated, ${data.created_count} created.`,
          "success",
          "Success"
        );

        parcelStarted = false;
        trackingNumber = "";
        parcelType = "";
        selectedPartyId = "";
        selectedPartySource = "";
        items = [];
        trackingInput.value = "";
        typeSelect.value = "";
        partySelect.value = "";
        scanInput.value = "";
        renderTable();
        trackingInput.focus();
      } catch (error) {
        showToast(`Submit error: ${error.message}`, "error", "Error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit";
      }
    }

    resetBtn.addEventListener("click", resetParcel);
    focusScannerBtn.addEventListener("click", focusScanner);
    submitBtn.addEventListener("click", submitParcel);

    trackingInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        startParcelFromTracking();
      }
    });

    scanInput.addEventListener("keydown", async (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();

      if (!parcelStarted) {
        showToast("Scan a parcel tracking number first.", "warning", "Warning");
        trackingInput.focus();
        return;
      }

      const scannedValue = scanInput.value.trim();
      scanInput.value = "";

      if (!scannedValue) return;

      await handleScannedBarcode(scannedValue);
    });

    itemsTableBody.addEventListener("input", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) return;

      const index = Number(target.dataset.index);
      const field = target.dataset.field;

      if (!Number.isInteger(index) || !items[index]) return;
      if (!["sku", "size"].includes(field)) return;

      items[index][field] = target.value;
    });

    itemsTableBody.addEventListener("click", (event) => {
      const button = event.target.closest("[data-delete-index]");
      if (!button) return;

      const index = Number(button.dataset.deleteIndex);
      if (!Number.isInteger(index) || !items[index]) return;

      const removed = items[index];
      items.splice(index, 1);
      renderTable();
      showToast(`Removed GTIN ${removed.gtin}.`, "success", "Success");
      focusScanner();
    });

    document.addEventListener("click", (event) => {
      const target = event.target;
      const clickedInsideEditableField =
        target === trackingInput ||
        target === scanInput ||
        (target instanceof HTMLInputElement && target.dataset.field) ||
        target.closest?.("[data-delete-index]") ||
        target.closest?.(".toast") ||
        target.closest?.(".home-button");

      if (!clickedInsideEditableField && parcelStarted) {
        focusScanner();
      }
    });

    renderTable();
      loadInboundParties();
      trackingInput.focus();
  </script>
</body>
</html>
