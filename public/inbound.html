<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lojiq WMS - Inbound</title>
  <style>
    :root {
      --bg: #07111F;
      --panel: #0E2238;
      --panel-2: #102944;
      --border: #163252;
      --primary: #2F80ED;
      --primary-soft: #66B3FF;
      --text: #DCEBFF;
      --muted: #8FAECC;
      --success: #1FA971;
      --danger: #E35D6A;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(47,128,237,0.18), transparent 30%),
        linear-gradient(180deg, #050D18 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1150px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(47,128,237,0.25), rgba(102,179,255,0.08));
      border: 1px solid rgba(102,179,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(47,128,237,0.15);
      font-size: 24px;
      font-weight: bold;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }

    .card {
      background: linear-gradient(180deg, rgba(16,41,68,0.95), rgba(14,34,56,0.95));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 18px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .input,
    .table input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(7,17,31,0.7);
      color: var(--text);
      padding: 14px 14px;
      font-size: 15px;
      outline: none;
    }

    .input:focus,
    .table input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(47,128,237,0.15);
    }

    .button {
      width: 100%;
      cursor: pointer;
      border-radius: 12px;
      border: none;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--primary-soft));
      color: white;
      transition: 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(47,128,237,0.25);
    }

    .button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      margin-top: 10px;
    }

    .status-box {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(7,17,31,0.55);
      border: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.8;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      background: rgba(47,128,237,0.14);
      border: 1px solid rgba(47,128,237,0.3);
      color: var(--primary-soft);
    }

    .scan-note {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px dashed rgba(102,179,255,0.35);
      color: var(--primary-soft);
      font-size: 13px;
      background: rgba(47,128,237,0.06);
    }

    .message {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      display: none;
      font-size: 14px;
    }

    .message.success {
      display: block;
      background: rgba(31,169,113,0.12);
      border: 1px solid rgba(31,169,113,0.35);
      color: #9BE3C4;
    }

    .message.error {
      display: block;
      background: rgba(227,93,106,0.12);
      border: 1px solid rgba(227,93,106,0.35);
      color: #FFB3BC;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(7,17,31,0.35);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(22,50,82,0.85);
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      background: rgba(7,17,31,0.5);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .qty {
      font-weight: 700;
      color: var(--primary-soft);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .actions .button {
      width: auto;
      min-width: 170px;
    }

    .hidden-scan {
      position: absolute;
      left: -9999px;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }

      .actions .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="logo">L</div>
      <div>
        <h1>Lojiq WMS</h1>
        <div class="subtitle">Inbound parcel receiving</div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>New Parcel</h2>

        <label class="label" for="trackingInput">Tracking Number</label>
        <input
          id="trackingInput"
          class="input"
          type="text"
          placeholder="Scan shipping label barcode"
          autocomplete="off"
        />

        <button class="button" id="startBtn">Start Parcel</button>
        <button class="button secondary" id="resetBtn">Reset</button>

        <div class="status-box">
          <div>Status: <strong id="statusText">Waiting for tracking scan</strong></div>
          <div>Tracking: <strong id="trackingDisplay">—</strong></div>
          <div>Unique barcodes: <span class="pill" id="uniqueCount">0</span></div>
          <div>Total items: <span class="pill" id="totalCount">0</span></div>
        </div>

        <div class="scan-note">
          After the parcel is started, your scanner can keep scanning item barcodes one after another.
        </div>

        <div id="messageBox" class="message"></div>
      </div>

      <div class="card">
        <h2>Parcel Summary</h2>

        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Product Code</th>
                <th>SKU</th>
                <th>Size</th>
                <th>Quantity</th>
              </tr>
            </thead>
            <tbody id="itemsTableBody">
              <tr>
                <td colspan="4" class="empty">No items scanned yet</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="actions">
          <button class="button secondary" id="focusScannerBtn">Focus Scanner</button>
          <button class="button" id="submitBtn">Submit Parcel</button>
        </div>
      </div>
    </div>
  </div>

  <input
    id="scanInput"
    class="hidden-scan"
    type="text"
    autocomplete="off"
    autocapitalize="off"
    spellcheck="false"
  />

  <script>
    const trackingInput = document.getElementById("trackingInput");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const submitBtn = document.getElementById("submitBtn");
    const focusScannerBtn = document.getElementById("focusScannerBtn");
    const scanInput = document.getElementById("scanInput");
  
    const statusText = document.getElementById("statusText");
    const trackingDisplay = document.getElementById("trackingDisplay");
    const uniqueCount = document.getElementById("uniqueCount");
    const totalCount = document.getElementById("totalCount");
    const itemsTableBody = document.getElementById("itemsTableBody");
    const messageBox = document.getElementById("messageBox");
  
    let parcelStarted = false;
    let trackingNumber = "";
    let items = [];
  
    function showMessage(text, type = "success") {
      messageBox.textContent = text;
      messageBox.className = `message ${type}`;
    }
  
    function clearMessage() {
      messageBox.textContent = "";
      messageBox.className = "message";
    }
  
    function focusScanner() {
      scanInput.focus();
      showMessage("Scanner ready.", "success");
    }
  
    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  
    function renderTable() {
      if (items.length === 0) {
        itemsTableBody.innerHTML = `
          <tr>
            <td colspan="4" class="empty">No items scanned yet</td>
          </tr>
        `;
        uniqueCount.textContent = "0";
        totalCount.textContent = "0";
        return;
      }
  
      itemsTableBody.innerHTML = items.map((item, index) => `
        <tr>
          <td>${escapeHtml(item.productCode)}</td>
          <td>
            <input
              value="${escapeHtml(item.sku)}"
              placeholder="Enter SKU"
              data-index="${index}"
              data-field="sku"
            />
          </td>
          <td>
            <input
              value="${escapeHtml(item.size)}"
              placeholder="Enter size"
              data-index="${index}"
              data-field="size"
            />
          </td>
          <td class="qty">${item.quantity}</td>
        </tr>
      `).join("");
  
      uniqueCount.textContent = String(items.length);
      totalCount.textContent = String(
        items.reduce((sum, item) => sum + item.quantity, 0)
      );
    }
  
    async function lookupProduct(productCode) {
      const response = await fetch("/api/lookup-product", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          product_code: productCode
        })
      });
  
      const data = await response.json();
  
      if (!response.ok) {
        throw new Error(data.details || data.error || "Lookup failed");
      }
  
      return data;
    }
  
    async function handleScannedBarcode(productCode) {
      const cleanCode = productCode.trim();
      if (!cleanCode) return;
  
      clearMessage();
  
      const existingItem = items.find(
        (item) => item.productCode === cleanCode
      );
  
      if (existingItem) {
        existingItem.quantity += 1;
        renderTable();
        showMessage(`Scanned again: ${cleanCode} quantity updated.`, "success");
        focusScanner();
        return;
      }
  
      const newItem = {
        productCode: cleanCode,
        sku: "",
        size: "",
        quantity: 1
      };
  
      items.push(newItem);
      renderTable();
      showMessage(`Scanned new barcode: ${cleanCode}`, "success");
  
      try {
        const lookup = await lookupProduct(cleanCode);
  
        if (lookup.found) {
          newItem.sku = lookup.sku || "";
          newItem.size = lookup.size || "";
          renderTable();
          showMessage(`Matched barcode ${cleanCode} from Stock Levels.`, "success");
        } else {
          showMessage(`Barcode ${cleanCode} not found. Please fill SKU and Size manually.`, "error");
        }
      } catch (error) {
        showMessage(`Lookup error: ${error.message}`, "error");
      }
  
      focusScanner();
    }
  
    function startParcel() {
      const value = trackingInput.value.trim();
  
      if (!value) {
        alert("Please scan the tracking number first.");
        trackingInput.focus();
        return;
      }
  
      trackingNumber = value;
      parcelStarted = true;
  
      statusText.textContent = "Parcel active — ready to scan item barcodes";
      trackingDisplay.textContent = trackingNumber;
  
      clearMessage();
      focusScanner();
    }
  
    function resetParcel() {
      parcelStarted = false;
      trackingNumber = "";
      items = [];
      trackingInput.value = "";
      scanInput.value = "";
      statusText.textContent = "Waiting for tracking scan";
      trackingDisplay.textContent = "—";
      clearMessage();
      renderTable();
      trackingInput.focus();
    }
  
    async function submitParcel() {
      clearMessage();
  
      if (!parcelStarted) {
        alert("Start the parcel first.");
        return;
      }
  
      if (!trackingNumber) {
        alert("Missing tracking number.");
        return;
      }
  
      if (!items.length) {
        alert("No items scanned.");
        return;
      }
  
      for (const item of items) {
        if (!item.productCode.trim()) {
          alert("One item is missing Product Code.");
          return;
        }
      }
  
      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";
  
      try {
        const response = await fetch("/api/submit-inbound", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            tracking_number: trackingNumber,
            items
          })
        });
  
        const data = await response.json();
  
        if (!response.ok) {
          throw new Error(data.details || data.error || "Submit failed");
        }
  
        showMessage(
          `Parcel submitted successfully. ${data.created_count} rows created.`,
          "success"
        );
  
        parcelStarted = false;
        trackingNumber = "";
        items = [];
        trackingInput.value = "";
        scanInput.value = "";
        statusText.textContent = "Waiting for tracking scan";
        trackingDisplay.textContent = "—";
        renderTable();
        trackingInput.focus();
  
      } catch (error) {
        showMessage(`Submit error: ${error.message}`, "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Parcel";
      }
    }
  
    startBtn.addEventListener("click", startParcel);
    resetBtn.addEventListener("click", resetParcel);
    focusScannerBtn.addEventListener("click", focusScanner);
    submitBtn.addEventListener("click", submitParcel);
  
    trackingInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        startParcel();
      }
    });
  
    scanInput.addEventListener("keydown", async (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
  
      if (!parcelStarted) {
        showMessage("Start a parcel first before scanning items.", "error");
        return;
      }
  
      const scannedValue = scanInput.value.trim();
      scanInput.value = "";
  
      if (!scannedValue) return;
  
      await handleScannedBarcode(scannedValue);
    });
  
    itemsTableBody.addEventListener("input", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) return;
  
      const index = Number(target.dataset.index);
      const field = target.dataset.field;
  
      if (!Number.isInteger(index) || !items[index]) return;
      if (!["sku", "size"].includes(field)) return;
  
      items[index][field] = target.value;
    });
  
    document.addEventListener("click", (event) => {
      const target = event.target;
      const clickedInsideEditableField =
        target === trackingInput ||
        target === scanInput ||
        (target instanceof HTMLInputElement && target.dataset.field);
  
      if (!clickedInsideEditableField && parcelStarted) {
        focusScanner();
      }
    });
  
    renderTable();
    trackingInput.focus();
  </script>
</body>
</html>
