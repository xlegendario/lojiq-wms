<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lojiq WMS - Receive Parcels</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .topbar {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 1000;
    }
    
    .home-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.3px;
      color: #DCEBFF;
      background: linear-gradient(135deg, #2F80ED, #66B3FF);
      border: 1px solid rgba(102, 179, 255, 0.35);
      box-shadow: 0 10px 24px rgba(47, 128, 237, 0.25);
      transition: all 0.2s ease;
    }
    
    .home-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(47, 128, 237, 0.35);
    }
    
    .home-button:active {
      transform: translateY(0);
      box-shadow: 0 6px 16px rgba(47, 128, 237, 0.2);
    }
    
    .home-icon {
      width: 22px;
      height: 22px;
    }
    
    :root {
      --bg: #07111F;
      --panel: #0E2238;
      --border: #163252;
      --primary: #2F80ED;
      --primary-soft: #66B3FF;
      --text: #DCEBFF;
      --muted: #8FAECC;

      --success-bg: #DDF5E8;
      --success-border: #16B364;
      --success-text: #184B32;

      --error-bg: #FDE8E8;
      --error-border: #F04438;
      --error-text: #5F2120;
    }

    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(47,128,237,0.18), transparent 30%),
        linear-gradient(180deg, #050D18 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px 120px;
      text-align: center;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 40px;
      color: var(--text);
      font-size: 28px;
      font-weight: 500;
    }

    .input-wrap {
      display: flex;
      justify-content: center;
    }

    input {
      width: 100%;
      max-width: 540px;
      padding: 22px 24px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.92);
      color: #1f2937;
      font-size: 22px;
      outline: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(47,128,237,0.16);
    }

    .help {
      margin-top: 18px;
      color: var(--muted);
      font-size: 15px;
    }

    .toast-stack {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      pointer-events: none;
      z-index: 9999;
    }

    .toast {
      width: min(720px, 100%);
      border-radius: 10px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.28);
      overflow: hidden;
      pointer-events: auto;
      animation: toastIn 0.22s ease-out;
    }

    .toast.success {
      background: var(--success-bg);
      border-bottom: 5px solid var(--success-border);
      color: var(--success-text);
    }

    .toast.error {
      background: var(--error-bg);
      border-bottom: 5px solid var(--error-border);
      color: var(--error-text);
    }

    .toast-inner {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 16px 18px 14px;
    }

    .toast-icon {
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
    }

    .toast.success .toast-icon {
      background: var(--success-border);
      color: white;
    }

    .toast.error .toast-icon {
      background: var(--error-border);
      color: white;
    }

    .toast-text {
      flex: 1;
      text-align: left;
      min-width: 0;
    }

    .toast-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 2px;
    }

    .toast-message {
      font-size: 15px;
      line-height: 1.35;
      word-break: break-word;
    }

    .toast-close {
      flex: 0 0 auto;
      border: none;
      background: transparent;
      color: inherit;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      opacity: 0.75;
      padding: 4px 8px;
    }

    .toast-close:hover {
      opacity: 1;
    }

    .toast.removing {
      animation: toastOut 0.18s ease-in forwards;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(10px);
      }
    }

    @media (max-width: 700px) {
      .wrap {
        padding-top: 40px;
      }

      h1 {
        font-size: 38px;
      }

      .subtitle {
        font-size: 22px;
      }

      input {
        font-size: 18px;
        padding: 18px 18px;
      }

      .toast-stack {
        left: 12px;
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/" class="home-button">
      <svg class="home-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
        <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Home
    </a>
  </div>
  
  <div class="wrap">
    <h1>Receive Parcels</h1>
    <p class="subtitle">Scan the parcel tracking barcode</p>

    <div class="input-wrap">
      <input
        id="scanInput"
        type="text"
        autofocus
        placeholder="Scan Tracking Number"
        autocomplete="off"
      />
    </div>

    <div class="help">
      Scan a parcel label. Each scan will be marked as received immediately.
    </div>
  </div>

  <div id="toastStack" class="toast-stack"></div>

  <script>
    const scanInput = document.getElementById("scanInput");
    const toastStack = document.getElementById("toastStack");

    function showToast(message, type = "success", title = "") {
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;

      const resolvedTitle =
        title ||
        (type === "success" ? "Success" : "Error");

      const icon = type === "success" ? "✓" : "✕";

      toast.innerHTML = `
        <div class="toast-inner">
          <div class="toast-icon">${icon}</div>
          <div class="toast-text">
            <div class="toast-title">${resolvedTitle}</div>
            <div class="toast-message">${escapeHtml(message)}</div>
          </div>
          <button class="toast-close" type="button" aria-label="Close">✕</button>
        </div>
      `;

      const closeBtn = toast.querySelector(".toast-close");

      function removeToast() {
        if (toast.classList.contains("removing")) return;
        toast.classList.add("removing");
        setTimeout(() => {
          toast.remove();
        }, 180);
      }

      closeBtn.addEventListener("click", removeToast);

      toastStack.appendChild(toast);

      setTimeout(removeToast, 5000);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function processScan(trackingNumber) {
      try {
        const res = await fetch("/api/receive-parcel", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tracking_number: trackingNumber })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.details || data.error || "Failed to receive parcel");
        }

        if (data.message) {
          showToast(data.message, "success", "Success");
        } else if (data.exists) {
          showToast(`Parcel ${trackingNumber} marked as Received.`, "success", "Success");
        } else {
          showToast(`Parcel ${trackingNumber} created and marked as Received.`, "success", "Success");
        }
      } catch (err) {
        showToast(err.message || "Something went wrong.", "error", "Error");
      } finally {
        scanInput.focus();
      }
    }

    scanInput.addEventListener("keydown", async (e) => {
      if (e.key !== "Enter") return;

      e.preventDefault();

      const value = scanInput.value.trim();
      scanInput.value = "";

      if (!value) return;

      await processScan(value);
    });

    document.addEventListener("click", () => {
      scanInput.focus();
    });

    scanInput.focus();
  </script>
</body>
</html>
